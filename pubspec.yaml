name: remix_workspace
environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dev_dependencies:
  melos: ^7.1.1
  flutter_lints: ^6.0.0
  build_runner: ^2.10.1

workspace:
  - packages/dashboard
  - packages/demo
  - packages/example
  - packages/playground
  - packages/remix

melos:
  packages:
    - packages/*

  command:
    bootstrap:
      environment:
        sdk: ">=3.12.0 <4.0.0"
        flutter: ">=3.44.0"

  scripts:
    generate:
      exec: dart run build_runner build
      description: Regenerate Remix sources
      packageFilters:
        scope: remix

    generate:check:
      exec: dart run tool/check_generated.dart
      description: Regenerate Remix sources and fail only on generated drift
      packageFilters:
        scope: remix

    test:flutter:
      exec: flutter test --reporter=failures-only
      description: Run flutter test
      packageFilters:
        dirExists: test

    ci:
      steps:
        - generate:check
        - docs:check
        - fortal:parity:check
        - test:flutter
      description: Verify generated sources, docs, Fortal parity, and tests

    fortal:parity:check:
      exec: dart run tool/fortal_parity/check.dart
      description: Verify the pinned Radix Themes 3.3.0 parity contract and coverage
      packageFilters:
        scope: remix

    docs:check:
      exec: dart run tool/validate_docs.dart
      description: Reject retired APIs in docs and examples, then analyze MDX Dart snippets
      packageFilters:
        scope: remix
