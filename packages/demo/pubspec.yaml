name: demo
description: Widgetbook catalog for reviewing Remix and Fortal components.
publish_to: "none"
version: 1.0.0+1
resolution: workspace

environment:
  sdk: ">=3.12.0 <4.0.0"

dependency_overrides:
  accessibility_tools: ^2.8.0
  # mix_protocol is not hosted yet and still pins Mix by git internally.
  # Override that transitive source so the workspace uses the hosted beta.
  mix: ^2.2.0-beta.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  widgetbook_annotation: ^3.11.0
  widgetbook: ^3.25.0
  remix:
    path: ../remix

dev_dependencies:
  flutter_test:
    sdk: flutter
  mix_protocol:
    git:
      url: https://github.com/btwld/mix.git
      ref: fb6aa7eccc0a4a21728ac61c662d96b94496dd55
      path: packages/mix_protocol
  widgetbook_generator: ^3.24.0

flutter:
  uses-material-design: true
