targets:
  $default:
    builders:
      mix_generator|mix_generator:
        enabled: true
        generate_for:
          - lib/**/*.dart
      mix_generator|spec_styler_generator:
        enabled: true
        generate_for:
          - lib/**/*.dart
      # Remix stylers come from @MixableSpec. Fortal wrappers stay
      # source-authored because Remix widgets do not extend StyleWidget<Spec>,
      # which @MixableSpec(target:) requires for same-build @MixWidget output.
      mix_generator|styler_generator:
        enabled: false
      mix_generator|mixable_generator:
        enabled: false
      mix_generator|mix_widget_generator:
        enabled: false
      mix_generator|modifier_generator:
        enabled: false
