name: remix
description: Remix is a modern, expressive design system built on top of Naked and Mix.
repository: https://github.com/btwld/remix
documentation: https://docs.page/btwld/remix
issue_tracker: https://github.com/btwld/remix/issues
license: BSD-3-Clause
resolution: workspace
topics:
  - design-system
  - ui
  - widgets
  - styling
  - mix

version: 1.0.0-beta.1

environment:
  sdk: ">=3.12.0 <4.0.0"
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  mix: ^2.1.0
  mix_annotations: ^2.2.0-beta.0
  naked_ui: 1.0.0-beta.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.10.1
  meta: ^1.18.0
  mix_generator: ^2.2.0-beta.0

flutter:
  uses-material-design: true
